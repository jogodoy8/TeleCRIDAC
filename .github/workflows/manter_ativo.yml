name: Manter Supabase Ativo

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Fazer requisição ao banco para evitar pausa
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/registros_atendimento?select=count" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
